<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>资产折旧记账</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
    body{background:#f5f7fa;padding-bottom:80px;}
    .header{background:#007aff;color:#fff;padding:50px 16px 14px;text-align:center;font-size:18px;font-weight:600;position:sticky;top:0;z-index:10;}

    .item{background:#fff;margin:10px;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px #00000015;}
    .row-main{padding:14px 16px;cursor:pointer;}
    .main-title{font-size:16px;font-weight:600;color:#007aff;margin-bottom:10px;}
    .main-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 4px;}
    .main-info div{font-size:13px;color:#333;}
    .main-info span{color:#007aff;font-weight:600;}

    .row-detail{max-height:0;overflow:hidden;transition:max-height 0.3s ease;}
    .row-detail.show{max-height:600px;padding:12px 16px;border-top:1px solid #eee;}

    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 8px;margin-bottom:10px;}
    .detail-item{display:flex;flex-direction:column;}
    .detail-item label{font-size:12px;color:#999;margin-bottom:4px;}
    .detail-item input{border:1px solid #ddd;border-radius:6px;padding:8px 6px;font-size:14px;text-align:center;outline:none;}
    .calc{background:#f8f8f8;border:none;pointer-events:none;}

    .del-btn{color:#ff3b30;font-size:13px;background:none;border:none;padding:6px 0;text-align:left;cursor:pointer;}
    .total-bar{background:#e8f4ff;margin:10px;border-radius:10px;padding:14px 16px;text-align:center;font-weight:600;}
    .add-btn{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:#007aff;color:#fff;font-size:26px;border:none;box-shadow:0 4px 12px rgba(0,122,255,0.3);z-index:99;cursor:pointer;}
  </style>
</head>
<body>
<div class="header">资产折旧记账</div>
<div id="listWrap"></div>
<div class="total-bar">每日总开支成本：<span id="totalAvg">0.00</span> 元/天</div>
<button class="add-btn" onclick="addNewItem()">+</button>

<script>
let data = JSON.parse(localStorage.getItem('assetList')) || [];
const today = new Date();
const todayStr = today.toISOString().split('T')[0];

// 计算单条逻辑
function calcOne(item){
  let buyDate = new Date(item.buyDate);
  let usedDays = Math.max(0, Math.floor((today - buyDate) / (1000*60*60*24)));
  let avgDay = usedDays > 0 ? (item.buyPrice / usedDays) : 0;
  let dailyCost = Number(item.dailyCost) || 0;
  let resale = Number(item.resalePrice) || 0;
  let remainVal = item.buyPrice - resale - (usedDays * dailyCost);
  let yearBack = remainVal / 365;
  return {usedDays, avgDay, remainVal, yearBack};
}

// 只更新合计，不刷新页面
function refreshTotal(){
  let sum = 0;
  data.forEach(item=>{
    let d = calcOne(item);
    sum += d.avgDay;
  });
  document.getElementById('totalAvg').innerText = sum.toFixed(2);
}

// 展开收起
function toggleExpand(idx){
  let box = document.querySelectorAll('.item')[idx];
  box.querySelector('.row-detail').classList.toggle('show');
}

// 保存数据 不整页渲染
function saveItem(idx, field, val){
  data[idx][field] = val;
  localStorage.setItem('assetList', JSON.stringify(data));
  // 只刷新顶部计算数值，不刷新输入框
  refreshItemView(idx);
  refreshTotal();
}

// 局部刷新当前条目的计算数值
function refreshItemView(idx){
  let d = calcOne(data[idx]);
  let itemDom = document.querySelectorAll('.item')[idx];
  itemDom.querySelector('.usedDays').innerText = d.usedDays + ' 天';
  itemDom.querySelector('.avgDay').innerText = '¥' + d.avgDay.toFixed(2);
  itemDom.querySelector('.remainVal').innerText = '¥' + d.remainVal.toFixed(2);
  itemDom.querySelector('.yearBack').innerText = d.yearBack.toFixed(2);
}

// 渲染初次列表
function renderList(){
  let wrap = document.getElementById('listWrap');
  wrap.innerHTML = '';
  data.forEach((item, idx)=>{
    let d = calcOne(item);
    let html = `
    <div class="item">
      <div class="row-main" onclick="toggleExpand(${idx})">
        <div class="main-title">${item.category||'未命名类目'} 👆点击展开编辑</div>
        <div class="main-info">
          <div>当前日期：<span>${todayStr}</span></div>
          <div>已用天数：<span class="usedDays">${d.usedDays} 天</span></div>
          <div>平均每天金额：<span class="avgDay">¥${d.avgDay.toFixed(2)}</span></div>
          <div>剩余价值：<span class="remainVal">¥${d.remainVal.toFixed(2)}</span></div>
          <div>预计回本/年：<span class="yearBack">${d.yearBack.toFixed(2)}</span></div>
        </div>
      </div>
      <div class="row-detail">
        <div class="detail-grid">
          <div class="detail-item">
            <label>类目名称</label>
            <input value="${item.category||''}" onblur="saveItem(${idx},'category',this.value)">
          </div>
          <div class="detail-item">
            <label>购买日期</label>
            <input type="date" value="${item.buyDate||todayStr}" onchange="saveItem(${idx},'buyDate',this.value)">
          </div>
          <div class="detail-item">
            <label>购入价格(元)</label>
            <input type="number" value="${item.buyPrice||0}" onblur="saveItem(${idx},'buyPrice',Number(this.value))">
          </div>
          <div class="detail-item">
            <label>预计二手卖出(元)</label>
            <input type="number" value="${item.resalePrice||0}" onblur="saveItem(${idx},'resalePrice',Number(this.value))">
          </div>
          <div class="detail-item">
            <label>每天预计成本(元)</label>
            <input type="number" value="${item.dailyCost||0}" onblur="saveItem(${idx},'dailyCost',Number(this.value))">
          </div>
        </div>
        <button class="del-btn" onclick="delItem(${idx})">删除本条记录</button>
      </div>
    </div>
    `;
    wrap.innerHTML += html;
  });
  refreshTotal();
}

// 新增条目
function addNewItem(){
  data.push({
    category:'',buyDate:todayStr,buyPrice:0,resalePrice:0,dailyCost:0
  });
  localStorage.setItem('assetList',JSON.stringify(data));
  renderList();
}

// 删除
function delItem(idx){
  if(confirm('确定删除？')){
    data.splice(idx,1);
    localStorage.setItem('assetList',JSON.stringify(data));
    renderList();
  }
}

// 初始化
renderList();
</script>
</body>
</html>
